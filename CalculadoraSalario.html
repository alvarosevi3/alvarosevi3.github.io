<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Salario</title>
    <style>
        /* --- CSS para dar estilo a la página --- */
        body {
            font-family: sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calculadora-container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #333;
        }
        .input-cuadrado {
            display: block;
            width: 90%;
            padding: 12px;
            margin: 10px auto; /* Centra los inputs */
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer; /* Muestra una manita al pasar el ratón */
            margin-top: 15px;
        }
        button:hover {
            background-color: #0056b3; /* Un color un poco más oscuro al pasar el ratón */
        }
        #resultado {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #28a745; /* Color verde para el resultado */
        }
    </style>
</head>
<body>

    <div class="calculadora-container">
        <h1>Calcula tu Cobro Mensual</h1>

        <input type="number" id="cobroPorHora" class="input-cuadrado" placeholder="¿Cuánto cobras por hora? (€)">

        <input type="number" id="semana1" class="input-cuadrado" placeholder="Horas trabajadas - Semana 1">
        <input type="number" id="semana2" class="input-cuadrado" placeholder="Horas trabajadas - Semana 2">
        <input type="number" id="semana3" class="input-cuadrado" placeholder="Horas trabajadas - Semana 3">
        <input type="number" id="semana4" class="input-cuadrado" placeholder="Horas trabajadas - Semana 4">

        <button onclick="calcularSalario()">Calcular Total</button>

        <p id="resultado"></p>
    </div>

    <script>
        // --- JavaScript para la lógica de cálculo ---

        function calcularSalario() {
            // 1. Obtenemos los valores de los campos de texto (inputs).
            // Usamos parseFloat para convertir el texto en un número decimal.
            const cobroPorHora = parseFloat(document.getElementById('cobroPorHora').value);
            const horasSemana1 = parseFloat(document.getElementById('semana1').value) || 0;
            const horasSemana2 = parseFloat(document.getElementById('semana2').value) || 0;
            const horasSemana3 = parseFloat(document.getElementById('semana3').value) || 0;
            const horasSemana4 = parseFloat(document.getElementById('semana4').value) || 0;

            // Verificamos si el cobro por hora es un número válido.
            if (isNaN(cobroPorHora) || cobroPorHora <= 0) {
                alert("Por favor, introduce un valor válido para el cobro por hora.");
                return; // Detenemos la función si no es válido.
            }

            // 2. Calculamos el total de horas trabajadas.
            const totalHoras = horasSemana1 + horasSemana2 + horasSemana3 + horasSemana4;

            // 3. Calculamos el salario total.
            const salarioTotal = totalHoras * cobroPorHora;

            // 4. Mostramos el resultado en la pantalla.
            // toFixed(2) es para mostrar el resultado con dos decimales (céntimos).
            const elementoResultado = document.getElementById('resultado');
            elementoResultado.innerText = `Tienes que cobrar: ${salarioTotal.toFixed(2)} €`;
        }
    </script>

</body>
</html>
