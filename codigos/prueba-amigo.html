<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amigo Invisible - Oficina</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            background-image: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #d63384;
            margin-bottom: 1.5rem;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box; /* Para que el padding no rompa el ancho */
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #d63384;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #b02a6b;
        }

        #resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none; /* Oculto por defecto */
            font-weight: bold;
        }

        .success {
            background-color: #d1e7dd;
            color: #0f5132;
            border: 1px solid #badbcc;
        }

        .error {
            background-color: #f8d7da;
            color: #842029;
            border: 1px solid #f5c2c7;
        }
    </style>
</head>
<body>

    <div class="card">
        <span class="icon">🎁</span>
        <h1>Amigo Invisible</h1>
        <p>Selecciona tu nombre e introduce tu contraseña para ver a quién te toca regalar.</p>

        <select id="selectorNombre">
            <option value="" disabled selected>-- Busca tu nombre --</option>
            </select>

        <input type="password" id="inputPass" placeholder="Tu contraseña secreta">

        <button onclick="descubrirAmigo()">Ver resultado</button>

        <div id="resultado"></div>
    </div>

    <script>
        // --- CONFIGURACIÓN: AQUÍ ES DONDE EDITARÁS LOS DATOS ---
        // Formato: nombre (lo que se ve), pass (contraseña), regaloPara (quien le toca)
        const participantes = [
            { nombre: "Laura",  pass: "gato123",  regaloPara: "Carlos" },
            { nombre: "Carlos", pass: "azul22",   regaloPara: "Ana" },
            { nombre: "Ana",    pass: "cafe99",   regaloPara: "David" },
            { nombre: "David",  pass: "music55",  regaloPara: "Laura" }
        ];
        // -------------------------------------------------------

        const selector = document.getElementById('selectorNombre');
        const resultadoDiv = document.getElementById('resultado');

        // Llenar el desplegable automáticamente
        participantes.forEach(persona => {
            let option = document.createElement('option');
            option.value = persona.nombre;
            option.text = persona.nombre;
            selector.appendChild(option);
        });

        function descubrirAmigo() {
            const nombreSeleccionado = selector.value;
            const passIntroducido = document.getElementById('inputPass').value;

            // Resetear estilos
            resultadoDiv.style.display = 'none';
            resultadoDiv.className = '';

            if (!nombreSeleccionado) {
                mostrarMensaje("Por favor, selecciona tu nombre.", "error");
                return;
            }

            // Buscar al usuario en la lista
            const usuario = participantes.find(p => p.nombre === nombreSeleccionado);

            if (usuario && usuario.pass === passIntroducido) {
                // ÉXITO: Mostrar a quién regala
                mostrarMensaje(`🎄 ¡Te ha tocado regalar a: ${usuario.regaloPara}! 🎄`, "success");
            } else {
                // ERROR: Contraseña incorrecta
                mostrarMensaje("Contraseña incorrecta. Inténtalo de nuevo.", "error");
            }
        }

        function mostrarMensaje(texto, tipo) {
            resultadoDiv.textContent = texto;
            resultadoDiv.className = tipo;
            resultadoDiv.style.display = 'block';
        }
    </script>
</body>
</html>
